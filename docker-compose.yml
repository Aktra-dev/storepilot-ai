version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: storepilot-db
    environment:
      POSTGRES_DB: storepilot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d storepilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: storepilot-api
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/storepilot
      APP_NAME: "StorePilot AI"
      APP_ENV: development
      DEBUG: "true"
      SECRET_KEY: "change-me-in-production-use-strong-secret"
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      AI_PROVIDER: "fallback"
      AI_API_KEY: ""
      CORS_ORIGINS: "*"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    command: >
      sh -c "
        python -c \"from app.core.database import Base; from app import models_registry; from sqlalchemy import create_engine; engine = create_engine('${DATABASE_URL}'); Base.metadata.create_all(bind=engine)\" &&
        python scripts/seed.py &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

volumes:
  postgres_data: